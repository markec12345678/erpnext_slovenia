name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff check
        run: ruff check erpnext_slovenia/ --line-length 110
        continue-on-error: true
      - name: Run ruff format check
        run: ruff format --check erpnext_slovenia/
        continue-on-error: true
